name: Sync requirements.txt with uv

on:

  workflow_dispatch:
  pull_request:
    paths:
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'uv.lock'
  push:
    paths:
      - 'pyproject.toml'

permissions:
  contents: write

jobs:
  update-requirements:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.event.pull_request == null)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
    - uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Export dependencies with uv
      run: |
        uv sync
        uv export --no-hashes > requirements.txt

    - name: Commit changes to the PR branch
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add requirements.txt
        git add uv.lock
        # Only commit if there are changes
        if [ -n "$(git status --porcelain --untracked=no)" ]; then
          if [ "${{ github.event_name }}" = "push" ]; then
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            REF="@${SHORT_SHA}"
          else
            REF="#${{ github.event.number }}"
          fi
          git commit -m "Beep boop: updated requirements.txt for ${{ github.event_name }} $REF"
          git push
          echo "Changes committed and pushed to the PR branch."
        else
          echo "No changes to commit."
        fi
