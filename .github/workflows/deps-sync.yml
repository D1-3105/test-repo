name: Sync requirements.txt with uv

on:
  workflow_dispatch:
  push:
    paths:
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'uv.lock'
  pull_request:
    paths:
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'uv.lock'

permissions:
  contents: write

jobs:
  update-requirements:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
    - uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Export dependencies with uv
      run: |
        uv sync
        uv export --no-hashes > requirements.txt

    - name: Commit changes to the PR branch
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add requirements.txt
        git add uv.lock
        # Only commit if there are changes
        if [ -n "$(git status --porcelain --untracked=no)" ]; then
          git commit -m "󰚩 Beep boop: updated requirements.txt via uv export"
          git push
          echo "Changes committed and pushed to the PR branch."
        else
          echo "No changes to commit."
        fi
